name: Scrape ONPE

on:
  schedule:
    # Cada 5 minutos durante la ventana de conteo (ajustar o desactivar después)
    - cron: "*/5 * * * *"
  workflow_dispatch: # permite correrlo manualmente desde la UI de GitHub

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape ONPE
        run: npx tsx src/scripts/scrape.ts

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results.json
          # Solo commitear si el archivo cambió (nuevos votos)
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos — skip."
          else
            git commit -m "data: actualizar resultados ONPE $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
